version: '3.8'

services:
  docharvester-frontend:
    build: ./frontend
    ports:
      - "3001:80"
    depends_on:
      - docharvester-backend
    networks:
      - docharvester-network
    restart: unless-stopped

  docharvester-backend:
    build: ./backend
    ports:
      - "5001:5000"
    volumes:
      - ./data:/app/data
      - ./backend:/app
    environment:
      - FLASK_ENV=production
      - PYTHONPATH=/app
    networks:
      - docharvester-network
    restart: unless-stopped

networks:
  docharvester-network:
    driver: bridge
