<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aeonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer ring representing the network -->
  <circle cx="64" cy="64" r="60" stroke="url(#aeonGradient)" stroke-width="3" fill="none" opacity="0.8"/>
  
  <!-- Inner geometric pattern representing AI efficiency -->
  <polygon points="64,20 90,44 90,84 64,108 38,84 38,44" stroke="url(#aeonGradient)" stroke-width="2" fill="none"/>
  
  <!-- Central core representing optimization -->
  <circle cx="64" cy="64" r="16" fill="url(#aeonGradient)" opacity="0.9"/>
  
  <!-- AEON text -->
  <text x="64" y="72" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="url(#aeonGradient)">AEON</text>
  
  <!-- Connection nodes -->
  <circle cx="64" cy="20" r="4" fill="#FFD700"/>
  <circle cx="90" cy="44" r="4" fill="#8B5CF6"/>
  <circle cx="90" cy="84" r="4" fill="#FFD700"/>
  <circle cx="64" cy="108" r="4" fill="#8B5CF6"/>
  <circle cx="38" cy="84" r="4" fill="#FFD700"/>
  <circle cx="38" cy="44" r="4" fill="#8B5CF6"/>
</svg>
