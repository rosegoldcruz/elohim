name: Docker LLM Runner

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker-llm-runner:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      run: |
        docker build -t llm-runner .
        
    - name: Run LLM Runner container
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        VERCEL_BLOB_READ_WRITE_TOKEN: ${{ secrets.VERCEL_BLOB_READ_WRITE_TOKEN }}
      run: |
        docker run --rm \
          -e SUPABASE_URL="${SUPABASE_URL}" \
          -e SUPABASE_SERVICE_ROLE_KEY="${SUPABASE_SERVICE_ROLE_KEY}" \
          -e VERCEL_BLOB_READ_WRITE_TOKEN="${VERCEL_BLOB_READ_WRITE_TOKEN}" \
          llm-runner node llm-runner.js
